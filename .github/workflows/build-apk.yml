name: Build APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Install Android 16 SDK
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Create stable debug keystore
        run: |
          rm -f debug.keystore
          keytool -genkeypair \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=PersonalWeather,C=JP"

      - name: Build debug APK
        run: |
          set +e
          gradle --no-daemon assembleDebug --stacktrace > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -nE "e: |error:|What went wrong|FAILURE|Unresolved|Type mismatch|Cannot|None of the following|Compilation error" build.log | tail -n 200 || true
          else
            tail -n 80 build.log
          fi
          exit $status

      - name: Prepare APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PersonalWeather-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PersonalWeather-debug-apk
          path: PersonalWeather-debug.apk
          if-no-files-found: error

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest-debug >/dev/null 2>&1; then
            gh release upload latest-debug PersonalWeather-debug.apk --clobber
          else
            gh release create latest-debug PersonalWeather-debug.apk \
              --title "Latest debug APK" \
              --notes "Androidスマホだけでインストールするための最新debug APKです。このReleaseをAndroid端末で開き、PersonalWeather-debug.apkを直接ダウンロードしてください。"
          fi
